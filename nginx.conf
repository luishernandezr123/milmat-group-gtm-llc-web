server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml text/html application/json;
    gzip_min_length 512;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
        expires 1h;
        add_header Cache-Control "public";
    }

    error_page 404 /404.html;
    location = /404.html { internal; }
}
